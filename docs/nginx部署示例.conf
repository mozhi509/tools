# Nginx 示例：静态站 + 将 /api 反代到 Node（避免 /api 被 SPA 的 index.html 吃掉）
#
# 症状：浏览器报错 Unexpected token '<' / JSON.parse —— 实际是拿到了 HTML。
# 原因：location / 里 try_files ... /index.html 把 /api/chat/create 也回退成了 index.html。
#
# 用法：把 root / proxy_pass 改成你的路径与 Node 端口，include 进 server { }。

server {
    listen 80;
    server_name your-domain.com;

    # 1) 必须先配置 /api，再配置前端静态
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2) 前端构建产物
    location / {
        root /path/to/your/repo/client/build;
        try_files $uri $uri/ /index.html;
    }
}
